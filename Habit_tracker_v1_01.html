<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #6366f1;
    --secondary-color: #ec4899;
    --success-color: #10b981;
    --danger-color: #ef4444;
    --warning-color: #f59e0b;
    --bg-color: #f9fafb;
    --card-bg: #ffffff;
    --text-dark: #1f2937;
    --text-light: #6b7280;
    --border-color: #e5e7eb;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: var(--text-dark);
}

.container {
    max-width: 800px;
    margin: 0 auto;
    background: var(--bg-color);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

header {
    text-align: center;
    margin-bottom: 40px;
}

header h1 {
    font-size: 2.5rem;
    color: var(--primary-color);
    margin-bottom: 10px;
    animation: slideDown 0.6s ease;
}

.subtitle {
    color: var(--text-light);
    font-size: 1rem;
    margin-bottom: 15px;
}

.header-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.save-btn,
.export-btn,
.import-btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.save-btn {
    background: var(--success-color);
    color: white;
}

.save-btn:hover {
    background: #059669;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
}

.export-btn {
    background: var(--primary-color);
    color: white;
}

.export-btn:hover {
    background: #4f46e5;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
}

.import-btn {
    background: var(--warning-color);
    color: white;
}

.import-btn:hover {
    background: #d97706;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.input-section {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.habit-input,
.category-select {
    flex: 1;
    min-width: 150px;
    padding: 12px 16px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.habit-input:focus,
.category-select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.add-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
}

.add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
}

.add-btn:active {
    transform: translateY(0);
}

.stats-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
}

.stat-card h3 {
    color: var(--text-light);
    font-size: 0.9rem;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-number {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--primary-color);
}

/* Chart Section Styles */
.chart-section {
    background: white;
    padding: 30px;
    border-radius: 15px;
    margin-bottom: 40px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
}

.chart-section h2 {
    margin-bottom: 20px;
    color: var(--text-dark);
    font-size: 1.5rem;
}

.chart-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.chart-btn {
    padding: 10px 20px;
    background: var(--border-color);
    color: var(--text-dark);
    border: 2px solid transparent;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.chart-btn:hover {
    background: var(--primary-color);
    color: white;
    transform: translateY(-2px);
}

.chart-btn.active {
    background: var(--primary-color);
    color: white;
    border-color: var(--primary-color);
    box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
}

.chart-container {
    position: relative;
    height: 300px;
    margin-bottom: 20px;
}

.chart-container canvas {
    max-height: 300px;
}

/* Habits Section */
.habits-section h2 {
    margin-bottom: 20px;
    color: var(--text-dark);
    font-size: 1.5rem;
}

.habits-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.empty-message {
    text-align: center;
    color: var(--text-light);
    padding: 40px 20px;
    font-size: 1.1rem;
}

.habit-item {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
    border-left: 5px solid var(--primary-color);
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.habit-item.completed {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
    border-left-color: var(--success-color);
}

.habit-info {
    flex: 1;
}

.habit-name {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dark);
}

.habit-meta {
    display: flex;
    gap: 15px;
    font-size: 0.9rem;
    color: var(--text-light);
}

.category-badge {
    display: inline-block;
    padding: 4px 12px;
    background: var(--primary-color);
    color: white;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: capitalize;
}

.category-badge.health { background: #ef4444; }
.category-badge.learning { background: #3b82f6; }
.category-badge.productivity { background: #f59e0b; }
.category-badge.wellness { background: #8b5cf6; }
.category-badge.other { background: #6b7280; }

.progress-bar {
    width: 100px;
    height: 6px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 5px;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success-color), var(--primary-color));
    border-radius: 3px;
    transition: width 0.3s ease;
}

.habit-streak {
    text-align: center;
    margin: 0 15px;
    min-width: 70px;
}

.streak-number {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--warning-color);
}

.streak-label {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 5px;
}

.habit-actions {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-check {
    background: var(--success-color);
    color: white;
}

.btn-check:hover {
    background: #059669;
    transform: scale(1.05);
}

.btn-delete {
    background: var(--danger-color);
    color: white;
}

.btn-delete:hover {
    background: #dc2626;
    transform: scale(1.05);
}

.btn:active {
    transform: scale(0.95);
}

/* Toast Notification */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 16px 24px;
    background: #1f2937;
    color: white;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    font-weight: 600;
    opacity: 0;
    transform: translateY(100px);
    transition: all 0.4s ease;
    pointer-events: none;
    z-index: 1000;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.toast.success {
    background: var(--success-color);
}

.toast.error {
    background: var(--danger-color);
}

.toast.info {
    background: var(--primary-color);
}

@media (max-width: 600px) {
    .container {
        padding: 20px;
    }

    header h1 {
        font-size: 1.8rem;
    }

    .header-actions {
        gap: 8px;
    }

    .save-btn,
    .export-btn,
    .import-btn {
        padding: 8px 12px;
        font-size: 0.8rem;
    }

    .input-section {
        flex-direction: column;
    }

    .habit-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .habit-actions {
        width: 100%;
    }

    .btn {
        flex: 1;
    }

    .stats-section {
        grid-template-columns: 1fr;
    }

    .chart-section {
        padding: 20px;
    }

    .chart-container {
        height: 250px;
    }

    .chart-controls {
        gap: 8px;
    }

    .chart-btn {
        padding: 8px 16px;
        font-size: 0.85rem;
    }

    .toast {
        left: 10px;
        right: 10px;
        bottom: 10px;
    }
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Habit Tracker</h1>
            <p class="subtitle">Build better habits, one day at a time</p>
            <div class="header-actions">
                <button id="saveBtn" class="save-btn" title="Save all changes">💾 Save</button>
                <button id="exportBtn" class="export-btn" title="Export as JSON">📥 Export</button>
                <button id="importBtn" class="import-btn" title="Import from JSON">📤 Import</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="habitInput" 
                placeholder="Enter a new habit (e.g., Exercise, Read, Meditate)" 
                class="habit-input"
            >
            <select id="categorySelect" class="category-select">
                <option value="health">Health</option>
                <option value="learning">Learning</option>
                <option value="productivity">Productivity</option>
                <option value="wellness">Wellness</option>
                <option value="other">Other</option>
            </select>
            <button id="addBtn" class="add-btn">+ Add Habit</button>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <h3>Total Habits</h3>
                <p id="totalHabits" class="stat-number">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed Today</h3>
                <p id="completedToday" class="stat-number">0</p>
            </div>
            <div class="stat-card">
                <h3>Current Streak</h3>
                <p id="currentStreak" class="stat-number">0</p>
            </div>
        </div>

        <div class="chart-section">
            <h2>Progress Analytics</h2>
            <div class="chart-controls">
                <button class="chart-btn active" data-range="7">7 Days</button>
                <button class="chart-btn" data-range="14">14 Days</button>
                <button class="chart-btn" data-range="30">30 Days</button>
            </div>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </div>

        <div class="habits-section">
            <h2>Your Habits</h2>
            <div id="habitsList" class="habits-list">
                <p class="empty-message">No habits yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // Habit Tracker Application with Save/Export Features

class HabitTracker {
    constructor() {
        this.habits = this.loadHabits();
        this.chart = null;
        this.currentChartRange = 7;
        this.lastSaveTime = this.loadLastSaveTime();
        this.initializeEventListeners();
        this.renderHabits();
        this.updateStats();
        this.initializeChart();
        this.setupAutoSave();
    }

    initializeEventListeners() {
        document.getElementById('addBtn').addEventListener('click', () => this.addHabit());
        document.getElementById('habitInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.addHabit();
        });

        // Save button
        document.getElementById('saveBtn').addEventListener('click', () => this.manualSave());

        // Export button
        document.getElementById('exportBtn').addEventListener('click', () => this.exportData());

        // Import button
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => this.importData(e));

        // Chart range buttons
        document.querySelectorAll('.chart-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.currentChartRange = parseInt(e.target.dataset.range);
                this.updateChart();
            });
        });

        // Auto-save on before unload
        window.addEventListener('beforeunload', () => this.saveHabits());
    }

    addHabit() {
        const input = document.getElementById('habitInput');
        const category = document.getElementById('categorySelect').value;
        const habitName = input.value.trim();

        if (!habitName) {
            this.showToast('Please enter a habit name', 'error');
            return;
        }

        const newHabit = {
            id: Date.now(),
            name: habitName,
            category: category,
            createdDate: new Date().toISOString(),
            completedDates: [],
            streak: 0
        };

        this.habits.push(newHabit);
        this.saveHabits();
        this.renderHabits();
        this.updateStats();
        this.updateChart();
        
        input.value = '';
        input.focus();
        this.showToast(`✅ Habit "${habitName}" added successfully!`, 'success');
    }

    deleteHabit(id) {
        const habit = this.habits.find(h => h.id === id);
        if (confirm(`Are you sure you want to delete "${habit.name}"?`)) {
            this.habits = this.habits.filter(habit => habit.id !== id);
            this.saveHabits();
            this.renderHabits();
            this.updateStats();
            this.updateChart();
            this.showToast('Habit deleted', 'success');
        }
    }

    toggleHabitCompletion(id) {
        const habit = this.habits.find(h => h.id === id);
        if (!habit) return;

        const today = this.getDateString(new Date());
        const index = habit.completedDates.indexOf(today);

        if (index > -1) {
            habit.completedDates.splice(index, 1);
            this.showToast(`${habit.name} marked incomplete`, 'info');
        } else {
            habit.completedDates.push(today);
            this.showToast(`✅ Great! ${habit.name} completed!`, 'success');
        }

        habit.streak = this.calculateStreak(habit);
        this.saveHabits();
        this.renderHabits();
        this.updateStats();
        this.updateChart();
    }

    calculateStreak(habit) {
        if (habit.completedDates.length === 0) return 0;

        const sortedDates = habit.completedDates.sort().reverse();
        let streak = 0;
        let currentDate = new Date();

        for (let i = 0; i < sortedDates.length; i++) {
            const checkDate = new Date(sortedDates[i]);
            const expectedDate = new Date(currentDate);
            expectedDate.setDate(expectedDate.getDate() - i);

            if (this.getDateString(checkDate) !== this.getDateString(expectedDate)) {
                break;
            }
            streak++;
        }

        return streak;
    }

    isCompletedToday(habit) {
        const today = this.getDateString(new Date());
        return habit.completedDates.includes(today);
    }

    getDateString(date) {
        return date.toISOString().split('T')[0];
    }

    getProgressPercentage(habit) {
        if (habit.completedDates.length === 0) return 0;
        
        const createdDate = new Date(habit.createdDate);
        const today = new Date();
        const daysSinceCreation = Math.floor((today - createdDate) / (1000 * 60 * 60 * 24)) + 1;
        
        return Math.min(100, Math.round((habit.completedDates.length / daysSinceCreation) * 100));
    }

    initializeChart() {
        const ctx = document.getElementById('progressChart').getContext('2d');
        this.chart = new Chart(ctx, {
            type: 'line',
            data: this.getChartData(this.currentChartRange),
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            font: { size: 12, weight: '600' },
                            color: '#6b7280',
                            padding: 15
                        }
                    },
                    title: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: this.habits.length || 1,
                        title: {
                            display: true,
                            text: 'Habits Completed'
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            stepSize: 1,
                            color: '#6b7280'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#6b7280'
                        }
                    }
                }
            }
        });
    }

    getChartData(days) {
        const labels = [];
        const completionData = [];
        const today = new Date();

        for (let i = days - 1; i >= 0; i--) {
            const date = new Date(today);
            date.setDate(date.getDate() - i);
            const dateStr = this.getDateString(date);
            labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));

            const completedCount = this.habits.filter(habit => 
                habit.completedDates.includes(dateStr)
            ).length;
            completionData.push(completedCount);
        }

        return {
            labels: labels,
            datasets: [{
                label: 'Habits Completed',
                data: completionData,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 5,
                pointBackgroundColor: '#6366f1',
                pointBorderColor: '#ffffff',
                pointBorderWidth: 2,
                pointHoverRadius: 7,
                pointHoverBackgroundColor: '#ec4899'
            }]
        };
    }

    updateChart() {
        if (this.chart) {
            this.chart.data = this.getChartData(this.currentChartRange);
            this.chart.update();
        }
    }

    renderHabits() {
        const habitsList = document.getElementById('habitsList');
        
        if (this.habits.length === 0) {
            habitsList.innerHTML = '<p class="empty-message">No habits yet. Add one to get started!</p>';
            return;
        }

        habitsList.innerHTML = this.habits.map(habit => {
            const isCompleted = this.isCompletedToday(habit);
            const progress = this.getProgressPercentage(habit);
            
            return `
                <div class="habit-item ${isCompleted ? 'completed' : ''}">
                    <div class="habit-info">
                        <div class="habit-name">${this.escapeHtml(habit.name)}</div>
                        <div class="habit-meta">
                            <span class="category-badge ${habit.category}">${habit.category}</span>
                            <span>Completed: ${habit.completedDates.length} days</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="habit-streak">
                        <div class="streak-number">🔥 ${habit.streak}</div>
                        <div class="streak-label">Streak</div>
                    </div>
                    <div class="habit-actions">
                        <button class="btn btn-check" onclick="app.toggleHabitCompletion(${habit.id})">
                            ${isCompleted ? '✓ Done' : 'Mark Done'}
                        </button>
                        <button class="btn btn-delete" onclick="app.deleteHabit(${habit.id})">Delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    updateStats() {
        const totalHabits = this.habits.length;
        const completedToday = this.habits.filter(h => this.isCompletedToday(h)).length;
        const maxStreak = this.habits.reduce((max, h) => Math.max(max, h.streak), 0);

        document.getElementById('totalHabits').textContent = totalHabits;
        document.getElementById('completedToday').textContent = completedToday;
        document.getElementById('currentStreak').textContent = maxStreak;
    }

    manualSave() {
        this.saveHabits();
        this.showToast('✅ All changes saved successfully!', 'success');
    }

    exportData() {
        const dataToExport = {
            version: '1.0',
            exportDate: new Date().toISOString(),
            habits: this.habits
        };

        const dataStr = JSON.stringify(dataToExport, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = `habit-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        this.showToast('✅ Data exported successfully!', 'success');
    }

    importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const importedData = JSON.parse(e.target.result);
                
                if (!importedData.habits || !Array.isArray(importedData.habits)) {
                    throw new Error('Invalid file format');
                }

                if (confirm('This will replace your current habits. Continue?')) {
                    this.habits = importedData.habits;
                    this.saveHabits();
                    this.renderHabits();
                    this.updateStats();
                    this.updateChart();
                    this.showToast('✅ Data imported successfully!', 'success');
                }
            } catch (error) {
                this.showToast('❌ Error importing file: ' + error.message, 'error');
            }
        };
        reader.readAsText(file);
        
        // Reset file input
        event.target.value = '';
    }

    setupAutoSave() {
        // Auto-save every 5 minutes
        setInterval(() => {
            this.saveHabits();
        }, 5 * 60 * 1000);
    }

    saveHabits() {
        localStorage.setItem('habits', JSON.stringify(this.habits));
        localStorage.setItem('lastSaveTime', new Date().toISOString());
    }

    loadHabits() {
        const stored = localStorage.getItem('habits');
        return stored ? JSON.parse(stored) : [];
    }

    loadLastSaveTime() {
        return localStorage.getItem('lastSaveTime') || null;
    }

    showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
}

// Initialize the app
const app = new HabitTracker();
    </script>
</body>
